<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hero 씬 후보 (프리뷰) — LIT @ KAIST</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" />
<style>
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{font-family:"Space Grotesk",-apple-system,"Apple SD Gothic Neo",sans-serif;color:#fff;overflow:hidden}
  #stage{position:fixed;inset:0;transition:background .6s ease}
  #c{position:absolute;inset:0;width:100%;height:100%;display:block}
  .center{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none;padding:0 24px}
  .eyebrow{letter-spacing:.22em;text-transform:uppercase;font-size:.8rem;opacity:.85;margin:0 0 14px}
  .title{font-weight:700;font-size:clamp(2rem,5.5vw,4rem);line-height:1.08;margin:0;text-shadow:0 2px 30px rgba(0,0,0,.45)}
  .sub{font-size:clamp(.95rem,1.8vw,1.2rem);opacity:.9;margin:18px 0 0}
  /* 컨트롤 */
  .panel{position:fixed;z-index:5;background:rgba(8,16,30,.55);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:10px 12px;font-size:.78rem}
  #scenes{left:14px;top:14px;max-width:230px}
  #pals{right:14px;top:14px}
  .panel b{display:block;opacity:.7;font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:.66rem;margin:0 0 6px}
  .panel .grp{margin-bottom:8px}
  button.opt{font:inherit;cursor:pointer;color:#fff;background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:5px 10px;margin:3px 3px 0 0}
  button.opt:hover{background:rgba(255,255,255,.2)}
  button.opt.on{background:#fff;color:#0a2240;border-color:#fff;font-weight:700}
  .hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:5;font-size:.72rem;opacity:.6;letter-spacing:.08em}
</style>
</head>
<body>
<div id="stage"><canvas id="c"></canvas></div>
<div class="center">
  <p class="eyebrow">Laboratory for Information Transmission</p>
  <h1 class="title">정보전송연구실 · LIT @ KAIST</h1>
  <p class="sub" id="sublabel">Communication · Sensing · Deep Learning</p>
</div>

<div class="panel" id="scenes">
  <div class="grp"><b>통신 (Communication)</b>
    <button class="opt" data-s="net-packets">1a 신호 네트워크</button>
    <button class="opt" data-s="net-pulse">1b 메시 펄스</button>
    <button class="opt" data-s="beam-lobe">2a 빔포밍 로브</button>
    <button class="opt" data-s="beam-wave">2b 위상배열 파동</button>
  </div>
  <div class="grp"><b>융합 ISAC</b>
    <button class="opt" data-s="isac-track">11a 추적+데이터</button>
    <button class="opt" data-s="isac-dual">11b 레이더 스윕</button>
  </div>
</div>
<div class="panel" id="pals">
  <b>팔레트 (계절)</b>
  <button class="opt" data-p="navy">남색</button>
  <button class="opt" data-p="spring">봄</button>
  <button class="opt" data-p="summer">여름</button>
  <button class="opt" data-p="autumn">가을</button>
  <button class="opt" data-p="winter">겨울</button>
</div>
<div class="hint">마우스를 움직여 보세요 · 씬/팔레트 버튼으로 비교</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
if(!window.THREE) return;
var canvas=document.getElementById("c"), stage=document.getElementById("stage");
var renderer=new THREE.WebGLRenderer({canvas:canvas,alpha:true,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
var scene=new THREE.Scene(), group=new THREE.Group(); scene.add(group);
var camera=new THREE.PerspectiveCamera(55,1,0.1,100); camera.position.z=5;

/* ---------- 팔레트 (계절별 색 조합) ---------- */
var PALS={
  navy:   {bg:["#0a4a86","#073f78","#04203f"], dot:"#dae7fb", line:"#6ea3df", c1:"#7fe0c0", c2:"#ffb86b"},
  spring: {bg:["#4f9a6e","#2f7a63","#123a36"], dot:"#eafbe2", line:"#9fd9b0", c1:"#ffd2e8", c2:"#ffe79a"},
  summer: {bg:["#0f86a6","#0a5f86","#03283f"], dot:"#defaff", line:"#5fd0e6", c1:"#ffe27a", c2:"#ff9ec4"},
  autumn: {bg:["#b5611f","#7f3a26","#2c1812"], dot:"#ffe9c8", line:"#e0a05f", c1:"#ffd27a", c2:"#9fd0a0"},
  winter: {bg:["#5a7fb0","#33558a","#0e1e36"], dot:"#eef6ff", line:"#a9cdec", c1:"#bfe9ff", c2:"#e7d9ff"}
};
var palName="navy", pal=PALS.navy;
function col(h){return new THREE.Color(h);}
function applyBg(){ stage.style.background="radial-gradient(120% 120% at 70% 18%,"+pal.bg[0]+" 0%,"+pal.bg[1]+" 45%,"+pal.bg[2]+" 100%)"; }

/* ---------- 공통: 원형 점 텍스처, 마우스, 헬퍼 ---------- */
var circleTex=(function(){var c=document.createElement("canvas");c.width=c.height=64;var g=c.getContext("2d");
  var gr=g.createRadialGradient(32,32,0,32,32,32);gr.addColorStop(0,"#fff");gr.addColorStop(.35,"rgba(255,255,255,.95)");gr.addColorStop(1,"rgba(255,255,255,0)");
  g.fillStyle=gr;g.beginPath();g.arc(32,32,32,0,7);g.fill();var t=new THREE.Texture(c);t.needsUpdate=true;return t;})();
var mouse={x:99,y:99,on:false};
window.addEventListener("pointermove",function(e){var r=canvas.getBoundingClientRect();
  mouse.x=((e.clientX-r.left)/r.width)*2-1; mouse.y=-((e.clientY-r.top)/r.height)*2+1; mouse.on=true;});
window.addEventListener("pointerleave",function(){mouse.on=false;});
var _v=new THREE.Vector3();
function mouseWorld(t){ // 마우스 → z=0 평면 좌표 (없으면 리사주 자동 이동)
  if(!mouse.on){ return {x:Math.sin(t*0.6)*2.0, y:Math.cos(t*0.47)*1.1, mx:Math.sin(t*0.6)*0.5, my:Math.cos(t*0.47)*0.4}; }
  _v.set(mouse.x,mouse.y,0.5).unproject(camera); var dir=_v.sub(camera.position).normalize();
  var d=-camera.position.z/dir.z; var w=camera.position.clone().add(dir.multiplyScalar(d));
  return {x:w.x,y:w.y,mx:mouse.x,my:mouse.y};
}
function layerP(max,color,size,opacity,vc){var pos=new Float32Array(max*3);var g=new THREE.BufferGeometry();
  g.setAttribute("position",new THREE.BufferAttribute(pos,3));var colArr=null;
  if(vc){colArr=new Float32Array(max*3);g.setAttribute("color",new THREE.BufferAttribute(colArr,3));}
  var m=new THREE.PointsMaterial({size:size,map:circleTex,transparent:true,opacity:opacity,sizeAttenuation:true,
    depthWrite:false,blending:THREE.AdditiveBlending});
  if(vc){m.vertexColors=true;} else {m.color=col(color);}
  var o=new THREE.Points(g,m);group.add(o);
  return {pos:pos,colArr:colArr,g:g,mat:m,count:function(n){g.setDrawRange(0,n);},flush:function(){g.attributes.position.needsUpdate=true;if(colArr)g.attributes.color.needsUpdate=true;}};}
function layerL(maxSeg,color,opacity){var pos=new Float32Array(maxSeg*6);var g=new THREE.BufferGeometry();
  g.setAttribute("position",new THREE.BufferAttribute(pos,3));
  var m=new THREE.LineBasicMaterial({color:col(color),transparent:true,opacity:opacity,depthWrite:false,blending:THREE.AdditiveBlending});
  var o=new THREE.LineSegments(g,m);group.add(o);
  return {pos:pos,g:g,mat:m,count:function(n){g.setDrawRange(0,n*2);},flush:function(){g.attributes.position.needsUpdate=true;}};}
function clearGroup(){for(var i=group.children.length-1;i>=0;i--){var o=group.children[i];if(o.geometry)o.geometry.dispose();group.remove(o);}}
group.rotation.set(0,0,0);

/* ============================ 씬들 ============================ */
var SCENES={};

/* 2a 빔포밍 로브: 신호가 멀리서 점으로 날아와(수신) → 빔 형성 + 빛 방출(송신).
   조향 -90~90°, 급격한 각도 변화 시 딜레이 */
SCENES["beam-lobe"]=function(){
  var base=[0,-1.7,0], Marr=8;
  var arr=layerP(Marr,pal.dot,.14,1);
  for(var i=0;i<Marr;i++){arr.pos[i*3]=(i-(Marr-1)/2)*0.22;arr.pos[i*3+1]=base[1];arr.pos[i*3+2]=0;} arr.flush();
  var K=140, th=[]; for(var k=0;k<K;k++)th.push(k/(K-1)*Math.PI);
  var SP=layerL(K,pal.c1,0), OUT=layerL(K,pal.line,0);
  var IN=90, isx=[],isy=[];
  for(var i2=0;i2<IN;i2++){var a=0.15+Math.random()*(Math.PI-0.3),rr=5+Math.random()*3.5;isx.push(base[0]+Math.cos(a)*rr);isy.push(base[1]+Math.sin(a)*rr);}
  var indot=layerP(IN,pal.dot,.1,1);
  // 송신 빔: 밝은 코어 직선 + 얇은 광채(가산 라인) — 어두워지는 영역 없음
  var core=layerL(1,pal.c1,0);
  var GI=16, glowIn=layerL(GI,pal.c1,0);
  var GO=16, glowOut=layerL(GO,pal.c1,0);
  var phi=0, delayT=0, slewing=false, last=0;
  return {update:function(t){var dt=Math.min(Math.max(t-last,0.001),0.05);last=t;var m=mouseWorld(t);
    // 목표 각(수직=broadside 기준), -90~90°로 제한
    var dx=m.x-base[0], dy=Math.max(m.y-base[1],0.0001), tp=Math.atan2(dx,dy);
    tp=Math.max(-1.5708,Math.min(1.5708,tp));
    var d=tp-phi;
    if(Math.abs(d)>0.5 && delayT<=0 && !slewing){ delayT=0.08+Math.min(Math.abs(d),3.14)*0.05; slewing=true; } // 급변 시 짧은 딜레이
    if(delayT>0){ delayT-=dt; } else { var step=3.6*dt; if(Math.abs(d)<=step){phi=tp;slewing=false;} else phi+=(d>0?1:-1)*step; }
    var thetaMain=Math.PI/2-phi;
    var conv=Math.min(t/1.5,1), ec=1-Math.pow(1-conv,3);
    var lobeOp=Math.max(0,Math.min((t-1.2)/1.0,1));
    // 수신: 멀리서 날아오는 점 → 배열로 수렴 후 사라짐
    indot.mat.opacity=Math.max(0,1-conv);
    for(var i=0;i<IN;i++){indot.pos[i*3]=isx[i]+(base[0]-isx[i])*ec;indot.pos[i*3+1]=isy[i]+(base[1]-isy[i])*ec;indot.pos[i*3+2]=0;}
    indot.flush();
    // 빔 로브
    var prevx=base[0],prevy=base[1];
    for(var k2=0;k2<K;k2++){var psi=Math.PI*(Math.cos(th[k2])-Math.cos(thetaMain));var af=Math.abs(Math.sin(Marr*psi/2)/(Marr*Math.sin(psi/2)+1e-6));
      var r2=0.3+af*3.2,bx=base[0]+Math.cos(th[k2])*r2,by=base[1]+Math.sin(th[k2])*r2;
      SP.pos[k2*6]=base[0];SP.pos[k2*6+1]=base[1];SP.pos[k2*6+2]=0;SP.pos[k2*6+3]=bx;SP.pos[k2*6+4]=by;SP.pos[k2*6+5]=0;
      OUT.pos[k2*6]=prevx;OUT.pos[k2*6+1]=prevy;OUT.pos[k2*6+2]=0;OUT.pos[k2*6+3]=bx;OUT.pos[k2*6+4]=by;OUT.pos[k2*6+5]=0;prevx=bx;prevy=by;}
    SP.mat.opacity=0.12*lobeOp;OUT.mat.opacity=0.55*lobeOp;SP.flush();OUT.flush();
    // 송신: 밝은 코어 + 얇은 광채 (가산 라인만 → 검정 영역 없음)
    var L=3.7, pulse=0.9+0.1*Math.sin(t*3);
    var tipx=base[0]+Math.cos(thetaMain)*L, tipy=base[1]+Math.sin(thetaMain)*L;
    core.mat.opacity=1.0*lobeOp;
    core.pos[0]=base[0];core.pos[1]=base[1];core.pos[2]=0;core.pos[3]=tipx;core.pos[4]=tipy;core.pos[5]=0;core.count(1);core.flush();
    function fan(layer,n,half){for(var s=0;s<n;s++){var off=((s/(n-1))-0.5)*2*half,a=thetaMain+off,o=s*6;
      layer.pos[o]=base[0];layer.pos[o+1]=base[1];layer.pos[o+2]=0;layer.pos[o+3]=base[0]+Math.cos(a)*L;layer.pos[o+4]=base[1]+Math.sin(a)*L;layer.pos[o+5]=0;}layer.count(n);layer.flush();}
    glowIn.mat.opacity=0.30*lobeOp*pulse; fan(glowIn,GI,0.03);   // 얇은 코어 광채
    glowOut.mat.opacity=0.10*lobeOp*pulse; fan(glowOut,GO,0.075); // 바깥 은은한 번짐
  }};
};

/* 2b 위상배열 파동: 멀리서 날아와 배열 형성 → 파동 높이에 따라 연결선 색이 밝음↔어두움 */
SCENES["beam-wave"]=function(){
  var cols=46,rows=24,N=cols*rows;
  var gx=[],gy=[],sx=[],sy=[];
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){gx.push(-3.2+(c/(cols-1))*6.4);gy.push(-1.8+(r/(rows-1))*3.6);
    var a=0.1+Math.random()*(Math.PI-0.2),rr=5+Math.random()*3.5;sx.push(Math.cos(a)*rr);sy.push(-1.7+Math.sin(a)*rr);}
  var M=5,ex=[];for(var e=0;e<M;e++)ex.push(-1.2+e*0.6);var ey=-1.95;
  // 연결선(가로·세로) — 정점 색을 파동 높이로 결정
  var edges=[];for(var r2=0;r2<rows;r2++)for(var c2=0;c2<cols;c2++){var id=r2*cols+c2;if(c2<cols-1)edges.push(id,id+1);if(r2<rows-1)edges.push(id,id+cols);}
  var E=edges.length/2;
  var lp=new Float32Array(E*6),lc=new Float32Array(E*6),lgeo=new THREE.BufferGeometry();
  lgeo.setAttribute("position",new THREE.BufferAttribute(lp,3));lgeo.setAttribute("color",new THREE.BufferAttribute(lc,3));
  group.add(new THREE.LineSegments(lgeo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.95,depthWrite:false,blending:THREE.AdditiveBlending})));
  var P=layerP(N,null,.05,.9,true); // 마루(crest)에 작은 반짝임
  var npx=new Float32Array(N),npy=new Float32Array(N),npz=new Float32Array(N),nr=new Float32Array(N),ng=new Float32Array(N),nb=new Float32Array(N);
  var low=col(pal.line), high=col(pal.dot); // 낮음=어두운 톤 → 높음=밝은 톤
  return {update:function(t){var m=mouseWorld(t);var grad=m.mx*2.6;
    var conv=Math.min(t/1.6,1),ec=1-Math.pow(1-conv,3);
    for(var i=0;i<N;i++){var s=0;for(var e=0;e<M;e++){var dx=gx[i]-ex[e],dy=gy[i]-ey,d=Math.sqrt(dx*dx+dy*dy);s+=Math.sin(d*6-t*4+e*grad);}
      var v=(s/M+1)/2; v*=v;                       // 0..1 (마루=1)
      npx[i]=sx[i]+(gx[i]-sx[i])*ec; npy[i]=sy[i]+(gy[i]-sy[i])*ec; npz[i]=(v-0.5)*1.1*ec;
      var b=0.10+0.90*v;                            // 높이에 따른 밝기
      nr[i]=(low.r+(high.r-low.r)*v)*b; ng[i]=(low.g+(high.g-low.g)*v)*b; nb[i]=(low.b+(high.b-low.b)*v)*b;
      P.pos[i*3]=npx[i];P.pos[i*3+1]=npy[i];P.pos[i*3+2]=npz[i];
      var pv=v*v;P.colArr[i*3]=high.r*pv;P.colArr[i*3+1]=high.g*pv;P.colArr[i*3+2]=high.b*pv;}
    P.flush();
    for(var k=0;k<E;k++){var a=edges[k*2],b2=edges[k*2+1],o=k*6;
      lp[o]=npx[a];lp[o+1]=npy[a];lp[o+2]=npz[a];lp[o+3]=npx[b2];lp[o+4]=npy[b2];lp[o+5]=npz[b2];
      lc[o]=nr[a];lc[o+1]=ng[a];lc[o+2]=nb[a];lc[o+3]=nr[b2];lc[o+4]=ng[b2];lc[o+5]=nb[b2];}
    lgeo.attributes.position.needsUpdate=true;lgeo.attributes.color.needsUpdate=true;}};
};

/* 11a ISAC 추적+데이터 */
SCENES["isac-track"]=function(){
  var BASE=[0,-1.7,0];
  var bp=layerP(1,pal.dot,.2,1);bp.pos[0]=BASE[0];bp.pos[1]=BASE[1];bp.pos[2]=BASE[2];bp.flush();
  var beam=layerL(3,pal.c1,.5); var tgt=layerL(28,pal.c2,.7);
  var BITS=18,bits=[];for(var i=0;i<BITS;i++)bits.push(Math.random()); var bp2=layerP(BITS,pal.c1,.12,1);
  var ECH=12,ech=[];for(var i=0;i<ECH;i++)ech.push(Math.random()); var ep=layerP(ECH,pal.c2,.11,1);
  var rings=[0,.33,.66]; var RG=layerL(48*rings.length,pal.c2,.18);
  var T={x:1.6,y:.6};
  return {update:function(t){var m=mouseWorld(t);T.x+=(m.x-T.x)*.06;T.y+=(m.y-T.y)*.06;
    var bx=BASE[0],by=BASE[1];var dx=T.x-bx,dy=T.y-by,len=Math.hypot(dx,dy),ux=dx/len,uy=dy/len,nx=-uy,ny=ux;
    // 빔(가는 삼각형)
    beam.pos.set([bx+nx*.06,by+ny*.06,0, T.x,T.y,0, bx-nx*.06,by-ny*.06,0]);
    // 빔을 2 세그먼트로
    beam.pos[0]=bx+nx*.05;beam.pos[1]=by+ny*.05;beam.pos[2]=0;beam.pos[3]=T.x;beam.pos[4]=T.y;beam.pos[5]=0;
    beam.pos[6]=bx-nx*.05;beam.pos[7]=by-ny*.05;beam.pos[8]=0;beam.pos[9]=T.x;beam.pos[10]=T.y;beam.pos[11]=0;
    beam.count(2);beam.flush();
    // 표적 마커(원)
    for(var k=0;k<28;k++){var a0=k/28*6.28,a1=(k+1)/28*6.28;tgt.pos[k*6]=T.x+Math.cos(a0)*.16;tgt.pos[k*6+1]=T.y+Math.sin(a0)*.16;tgt.pos[k*6+2]=0;tgt.pos[k*6+3]=T.x+Math.cos(a1)*.16;tgt.pos[k*6+4]=T.y+Math.sin(a1)*.16;tgt.pos[k*6+5]=0;}tgt.flush();
    // 비트(통신): base→target
    for(var i=0;i<BITS;i++){bits[i]+=.012;if(bits[i]>1)bits[i]-=1;var p=bits[i];bp2.pos[i*3]=bx+dx*p;bp2.pos[i*3+1]=by+dy*p;bp2.pos[i*3+2]=0;}bp2.flush();
    // 에코(센싱): target→base
    for(var i2=0;i2<ECH;i2++){ech[i2]+=.016;if(ech[i2]>1)ech[i2]-=1;var p2=ech[i2];ep.pos[i2*3]=T.x-dx*p2;ep.pos[i2*3+1]=T.y-dy*p2;ep.pos[i2*3+2]=0;}ep.flush();
    // 레인지 링(센싱)
    var seg=48,maxR=2.6;for(var ri=0;ri<rings.length;ri++){rings[ri]+=.004;if(rings[ri]>1)rings[ri]-=1;var rad=rings[ri]*maxR;
      for(var s=0;s<seg;s++){var a0=s/seg*6.28,a1=(s+1)/seg*6.28,o=(ri*seg+s)*6;
        RG.pos[o]=bx+Math.cos(a0)*rad;RG.pos[o+1]=by+Math.sin(a0)*rad;RG.pos[o+2]=0;RG.pos[o+3]=bx+Math.cos(a1)*rad;RG.pos[o+4]=by+Math.sin(a1)*rad;RG.pos[o+5]=0;}}RG.flush();}};
};

/* 11b 레이더 스윕 (센싱) + 표적 점등 */
SCENES["isac-dual"]=function(){
  var NT=60,tx=[],ty=[],lit=[];for(var i=0;i<NT;i++){tx.push((Math.random()-.5)*6);ty.push((Math.random()-.5)*3.4);lit.push(0);}
  var TP=layerP(NT,null,.13,1,true);for(var i=0;i<NT;i++){TP.pos[i*3]=tx[i];TP.pos[i*3+1]=ty[i];}
  var SW=layerL(2,pal.c1,.6); var arc=layerL(40,pal.c1,.15);
  var base=col(pal.dot),hot=col(pal.c2);
  return {update:function(t){var ang=t*1.1%(Math.PI*2);var ux=Math.cos(ang),uy=Math.sin(ang);
    SW.pos.set([0,0,0, ux*3.6,uy*3.6,0]);SW.count(1);SW.flush();
    for(var s=0;s<40;s++){var a0=ang-(s/40)*0.6,a1=ang-((s+1)/40)*0.6,rr=3.6,o=s*6;arc.pos[o]=Math.cos(a0)*rr;arc.pos[o+1]=Math.sin(a0)*rr;arc.pos[o+2]=0;arc.pos[o+3]=Math.cos(a1)*rr;arc.pos[o+4]=Math.sin(a1)*rr;arc.pos[o+5]=0;}arc.flush();
    for(var i=0;i<NT;i++){var ta=Math.atan2(ty[i],tx[i]);var diff=Math.abs(((ta-ang)+Math.PI*3)%(Math.PI*2)-Math.PI);
      if(diff<0.08)lit[i]=1; lit[i]*=0.97; var v=0.25+lit[i]*0.75;
      TP.colArr[i*3]=base.r+(hot.r-base.r)*lit[i];TP.colArr[i*3+1]=base.g+(hot.g-base.g)*lit[i];TP.colArr[i*3+2]=base.b+(hot.b-base.b)*lit[i];
      TP.pos[i*3+2]=0;}
    TP.g.attributes.color.needsUpdate=true;TP.flush();}};
};

/* 1a 신호 네트워크 (노드+엣지+패킷) */
SCENES["net-packets"]=function(){
  var N=30,nx=[],ny=[],nz=[];for(var i=0;i<N;i++){nx.push((Math.random()-.5)*5.6);ny.push((Math.random()-.5)*3.2);nz.push((Math.random()-.5)*2);}
  var edges=[];for(var p=0;p<N;p++)for(var q=p+1;q<N;q++){var d=Math.hypot(nx[p]-nx[q],ny[p]-ny[q],nz[p]-nz[q]);if(d<1.7)edges.push(p,q);}
  var NP=layerP(N,pal.dot,.14,1),L=layerL(edges.length,pal.line,.2);
  for(var i=0;i<N;i++){NP.pos[i*3]=nx[i];NP.pos[i*3+1]=ny[i];NP.pos[i*3+2]=nz[i];}NP.flush();
  for(var e=0;e<edges.length;e+=2){var a=edges[e],b=edges[e+1],o=e*3;L.pos[o]=nx[a];L.pos[o+1]=ny[a];L.pos[o+2]=nz[a];L.pos[o+3]=nx[b];L.pos[o+4]=ny[b];L.pos[o+5]=nz[b];}L.flush();
  var PK=60,pk=[];for(var k=0;k<PK;k++)pk.push({e:(Math.random()*edges.length/2|0)*2,t:Math.random(),s:.01+Math.random()*.02});
  var PKP=layerP(PK,pal.c1,.12,1);
  return {update:function(t){group.rotation.y=t*0.05;
    for(var k=0;k<PK;k++){var q=pk[k];q.t+=q.s;if(q.t>1){q.t=0;q.e=(Math.random()*edges.length/2|0)*2;}
      var a=edges[q.e],b=edges[q.e+1];PKP.pos[k*3]=nx[a]+(nx[b]-nx[a])*q.t;PKP.pos[k*3+1]=ny[a]+(ny[b]-ny[a])*q.t;PKP.pos[k*3+2]=nz[a]+(nz[b]-nz[a])*q.t;}PKP.flush();}};
};

/* 1b 메시 펄스 (격자에서 파동이 번짐) */
SCENES["net-pulse"]=function(){
  var cols=26,rows=15,N=cols*rows,gx=[],gy=[];for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){gx.push(-3.4+(c/(cols-1))*6.8);gy.push(-1.9+(r/(rows-1))*3.8);}
  var P=layerP(N,null,.08,.95,true);for(var i=0;i<N;i++){P.pos[i*3]=gx[i];P.pos[i*3+1]=gy[i];}
  var edges=[];for(var r2=0;r2<rows;r2++)for(var c2=0;c2<cols;c2++){var id=r2*cols+c2;if(c2<cols-1)edges.push(id,id+1);if(r2<rows-1)edges.push(id,id+cols);}
  var L=layerL(edges.length,pal.line,.12);for(var e=0;e<edges.length;e+=2){var a=edges[e],b=edges[e+1],o=e*3;L.pos[o]=gx[a];L.pos[o+1]=gy[a];L.pos[o+2]=0;L.pos[o+3]=gx[b];L.pos[o+4]=gy[b];L.pos[o+5]=0;}L.flush();
  var pulses=[{x:-2,y:0,t0:0},{x:2,y:.5,t0:1.5}];var base=col(pal.dot),hot=col(pal.c1);
  return {update:function(t){var m=mouseWorld(t);
    for(var pi=0;pi<pulses.length;pi++){if(t-pulses[pi].t0>4){pulses[pi].t0=t;pulses[pi].x=(pi===0?m.x:(Math.random()-.5)*5);pulses[pi].y=(pi===0?m.y:(Math.random()-.5)*3);}}
    for(var i=0;i<N;i++){var v=0;for(var pj=0;pj<pulses.length;pj++){var d=Math.hypot(gx[i]-pulses[pj].x,gy[i]-pulses[pj].y);var wf=(t-pulses[pj].t0)*2.4;var g=Math.exp(-Math.pow(d-wf,2)*3);v=Math.max(v,g);}
      var b=0.22+v*0.78;P.colArr[i*3]=base.r+(hot.r-base.r)*v;P.colArr[i*3+1]=base.g+(hot.g-base.g)*v;P.colArr[i*3+2]=base.b+(hot.b-base.b)*v;P.pos[i*3+2]=v*0.4;}
    P.flush();}};
};

/* ============================ 런타임 ============================ */
var cur=null, curName="beam-wave", t0=null;
function setScene(name){curName=name;clearGroup();group.rotation.set(0,0,0);t0=null;cur=SCENES[name]();
  document.querySelectorAll("#scenes .opt").forEach(function(b){b.classList.toggle("on",b.dataset.s===name);});}
function setPal(name){palName=name;pal=PALS[name];applyBg();setScene(curName);
  document.querySelectorAll("#pals .opt").forEach(function(b){b.classList.toggle("on",b.dataset.p===name);});}
document.querySelectorAll("#scenes .opt").forEach(function(b){b.onclick=function(){setScene(b.dataset.s);};});
document.querySelectorAll("#pals .opt").forEach(function(b){b.onclick=function(){setPal(b.dataset.p);};});

function resize(){var w=canvas.clientWidth,h=canvas.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
window.addEventListener("resize",resize);resize();
function loop(ts){if(t0===null)t0=ts;var t=(ts-t0)/1000;if(cur)cur.update(t);renderer.render(scene,camera);requestAnimationFrame(loop);}
// 쿼리 파라미터 (?scene=, ?palette=)
var qs=new URLSearchParams(location.search);
setPal(PALS[qs.get("palette")]?qs.get("palette"):"navy");
setScene(SCENES[qs.get("scene")]?qs.get("scene"):"beam-wave");
requestAnimationFrame(loop);
})();
</script>
